{{- if .Values.rbac.enabled -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ default (printf "%s-binding" (include "scheduledScriptJob.fullname" .)) .Values.rbac.clusterRoleBindingName }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ if .Values.rbac.existingClusterRole }}{{ .Values.rbac.existingClusterRole }}{{ else }}{{ default (include "scheduledScriptJob.fullname" .) .Values.rbac.clusterRoleName }}{{ end }}
subjects:
- kind: ServiceAccount
  name: {{ include "scheduledScriptJob.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}
