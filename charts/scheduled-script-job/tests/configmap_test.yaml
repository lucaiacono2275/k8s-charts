# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: configmap test suite
templates:
  - configmap.yaml
tests:
  - it: should render a ConfigMap with inline script content
    set:
      script:
        fileName: job-script.sh
        content: |-
          #!/bin/sh
          echo "Hello from scheduled-script-job"
    release:
      name: my-release
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: my-release-scheduled-script-job-script
      - equal:
          path: data["job-script.sh"]
          value: "#!/bin/sh\necho \"Hello from scheduled-script-job\""
