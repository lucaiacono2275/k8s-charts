# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: service account test suite
templates:
  - serviceaccount.yaml
tests:
  - it: should render a ServiceAccount when enabled
    set:
      serviceAccount:
        create: true
    release:
      name: my-release
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: my-release-scheduled-script-job
