# -- labels
labels:
# -- name override
# nameOverride: postgresql
# -- namespace
# namespace: database
# -- databases
databases:
# -- enable Connection Pooler
enableConnectionPooler: false
# -- enable Master LoadBalancer
enableMasterLoadBalancer: false
# -- number Of Instances
numberOfInstances: 1
# -- patroni config
patroni:
# -- postgresql version
version: 16
# -- resources
resources:
# -- initContainers
initContainers:
# -- users
users:
# -- tls
tls:
# -- sidecars
sidecars:
# -- spilo options
spilo:
  spiloFSGroup: 103
# -- volume size
volumeSize: 1Gi
# -- storage class
storageClass: local-path
# -- clone (optional)
# clone:
#   clusterName: my-cluster
#   timestamp: "2026-01-01T00:00:00Z"
