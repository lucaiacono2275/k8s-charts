suite: postgres test suite
templates:
  - postgres.yaml
tests:
  - it: should generate a postgres object
    release:
      name: myrelease
      namespace: mynamespace
    values: 
      - ./values/values-1.yaml
    asserts:
      - containsDocument:
          kind: postgresql
          apiVersion: acid.zalan.do/v1
          name: "postgresql"
          namespace: database
      - equal:
          path: spec.databases.user1
          value: user1.ns1
      - equal:
          path: spec.databases.user2
          value: user2.ns2
      - equal:
          path: spec.databases.user3
          value: user3.ns3
      - equal:
          path: spec.tls.secretName
          value: "secret"
      - equal:
          path: spec.spiloFSGroup
          value: 103
  - it: should apply annotations when provided
    release:
      name: myrelease
      namespace: mynamespace
    values:
      - ./values/values-2.yaml
    asserts:
      - containsDocument:
          kind: postgresql
          apiVersion: acid.zalan.do/v1
          name: "postgresql"
          namespace: database
      - equal:
          path: metadata.annotations
          value:
            example.com/annotation1: value1
            example.com/annotation2: value2
  - it: should not have annotations when not provided
    release:
      name: myrelease
      namespace: mynamespace
    values:
      - ./values/values-1.yaml
    asserts:
      - containsDocument:
          kind: postgresql
          apiVersion: acid.zalan.do/v1
          name: "postgresql"
          namespace: database
      - notExists:
          path: metadata.annotations
  - it: should apply env variables when provided
    release:
      name: myrelease
      namespace: mynamespace
    values:
      - ./values/values-3.yaml
    asserts:
      - containsDocument:
          kind: postgresql
          apiVersion: acid.zalan.do/v1
          name: "postgresql"
          namespace: database
      - equal:
          path: spec.env
          value:
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
  - it: should not have env when not provided
    release:
      name: myrelease
      namespace: mynamespace
    values:
      - ./values/values-1.yaml
    asserts:
      - containsDocument:
          kind: postgresql
          apiVersion: acid.zalan.do/v1
          name: "postgresql"
          namespace: database
      - notExists:
          path: spec.env
  - it: should apply resources when provided
    release:
      name: myrelease
      namespace: mynamespace
    values:
      - ./values/values-4.yaml
    asserts:
      - containsDocument:
          kind: postgresql
          apiVersion: acid.zalan.do/v1
          name: "postgresql"
          namespace: database
      - equal:
          path: spec.resources.requests.cpu
          value: 100m
      - equal:
          path: spec.resources.requests.memory
          value: 256Mi
      - equal:
          path: spec.resources.limits.cpu
          value: 500m
      - equal:
          path: spec.resources.limits.memory
          value: 512Mi
  - it: should apply initContainers when provided
    release:
      name: myrelease
      namespace: mynamespace
    values:
      - ./values/values-6.yaml
    asserts:
      - containsDocument:
          kind: postgresql
          apiVersion: acid.zalan.do/v1
          name: "postgresql"
          namespace: database
      - equal:
          path: spec.initContainers[0].name
          value: init-myservice
      - equal:
          path: spec.initContainers[0].image
          value: busybox
      - equal:
          path: spec.initContainers[0].command[0]
          value: /bin/sh
  - it: should not have initContainers when not provided
    release:
      name: myrelease
      namespace: mynamespace
    values:
      - ./values/values-1.yaml
    asserts:
      - containsDocument:
          kind: postgresql
          apiVersion: acid.zalan.do/v1
          name: "postgresql"
          namespace: database
      - notExists:
          path: spec.initContainers
  - it: should apply sidecars when provided
    release:
      name: myrelease
      namespace: mynamespace
    values:
      - ./values/values-7.yaml
    asserts:
      - containsDocument:
          kind: postgresql
          apiVersion: acid.zalan.do/v1
          name: "postgresql"
          namespace: database
      - equal:
          path: spec.sidecars[0].name
          value: prometheus-exporter
      - equal:
          path: spec.sidecars[0].image
          value: quay.io/prometheus/exporter:latest
      - equal:
          path: spec.sidecars[0].ports[0].containerPort
          value: 9187
  - it: should not have sidecars when not provided
    release:
      name: myrelease
      namespace: mynamespace
    values:
      - ./values/values-1.yaml
    asserts:
      - containsDocument:
          kind: postgresql
          apiVersion: acid.zalan.do/v1
          name: "postgresql"
          namespace: database
      - notExists:
          path: spec.sidecars
  - it: should not render clone when not provided
    release:
      name: myrelease
      namespace: mynamespace
    values:
      - ./values/values-1.yaml
    asserts:
      - containsDocument:
          kind: postgresql
          apiVersion: acid.zalan.do/v1
          name: "postgresql"
          namespace: database
      - notExists:
          path: spec.clone
  - it: should render clone when provided
    release:
      name: myrelease
      namespace: mynamespace
    values:
      - ./values/values-clone.yaml
    asserts:
      - containsDocument:
          kind: postgresql
          apiVersion: acid.zalan.do/v1
          name: "postgresql"
          namespace: database
      - equal:
          path: spec.clone.enabled
          value: true
      - equal:
          path: spec.clone.clusterName
          value: cloned-cluster
