# -- labels
labels:
# -- name override
nameOverride: postgresql
# -- namespace
namespace: database
# -- databases
databases:
  user1: user1.ns1
# -- enable Connection Pooler
enableConnectionPooler: false
# -- enable Master LoadBalancer
enableMasterLoadBalancer: false
# -- number Of Instances
numberOfInstances: 1
# -- patroni config
patroni:
  pg_hba:
  - local     all  all  trust
# -- postgresql version
version: 16
# -- initContainers
initContainers:
- name: init-myservice
  image: busybox
  command:
    - /bin/sh
    - -c
    - echo init
# -- tls
tls:
  secretName: "secret"
# -- spilo options
spilo:
  spiloFSGroup: 103
# -- volume size
volumeSize: 1Gi
# -- storage class
storageClass: local-path
