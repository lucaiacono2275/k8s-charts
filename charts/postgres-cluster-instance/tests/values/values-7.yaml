# -- labels
labels:
# -- name override
nameOverride: postgresql
# -- namespace
namespace: database
# -- databases
databases:
  user1: user1.ns1
# -- enable Connection Pooler
enableConnectionPooler: false
# -- enable Master LoadBalancer
enableMasterLoadBalancer: false
# -- number Of Instances
numberOfInstances: 1
# -- postgresql version
version: 16
# -- podTemplate
podTemplate:
  metadata:
    labels:
      app: postgresql
      tier: database
  spec:
    serviceAccountName: postgres-sa
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: node-type
              operator: In
              values:
              - database
    tolerations:
    - key: dedicated
      operator: Equal
      value: database
      effect: NoSchedule
    securityContext:
      fsGroup: 103
# -- volume size
volumeSize: 1Gi
storageClass: local-path
