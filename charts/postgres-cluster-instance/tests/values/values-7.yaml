# -- labels
labels:
# -- name override
nameOverride: postgresql
# -- namespace
namespace: database
# -- databases
databases:
  user1: user1.ns1
# -- enable Connection Pooler
enableConnectionPooler: false
# -- enable Master LoadBalancer
enableMasterLoadBalancer: false
# -- number Of Instances
numberOfInstances: 1
# -- postgresql version
version: 16
# -- sidecars
sidecars:
  - name: prometheus-exporter
    image: quay.io/prometheus/exporter:latest
    ports:
      - containerPort: 9187
# -- volume size
volumeSize: 1Gi
storageClass: local-path
